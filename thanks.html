<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you — Château Privé · Cannes 2026</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#F1ECDF; color:#1A1612; font-family:'EB Garamond',Georgia,serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 24px; line-height:1.6; }
  .wrap { max-width:520px; text-align:center; }
  .brand { font-family:'Cormorant Garamond',Georgia,serif; font-style:italic; font-size:18px; color:#9a7d44; margin-bottom:56px; }
  .eyebrow { font-size:11px; color:#8a8270; letter-spacing:4px; text-transform:uppercase; margin-bottom:18px; }
  h1 { font-family:'Cormorant Garamond',Georgia,serif; font-style:italic; font-weight:300; font-size:48px; line-height:1.05; color:#B8965A; letter-spacing:-0.5px; margin-bottom:24px; }
  .divider { display:block; width:50px; height:1px; background:#B8965A; margin:0 auto 28px; }
  p { font-size:17px; line-height:1.7; color:#4a4337; margin-bottom:18px; }
  .signature { margin-top:48px; font-family:'Cormorant Garamond',Georgia,serif; font-style:italic; font-size:15px; color:#8a8270; }
  .signature .sig { color:#9a7d44; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Château Privé</div>
  <p class="eyebrow">Request Received</p>
  <h1>Thank you.</h1>
  <span class="divider"></span>
  <p>Your request has been received. Each application is reviewed personally — given the limited capacity, not all requests can be approved.</p>
  <p>If you are confirmed, you will receive a separate access confirmation by email.</p>
  <p class="signature">With our regards,<br><span class="sig">Château Privé</span></p>
</div>
</body>
</html>
